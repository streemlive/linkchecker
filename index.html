<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Kipas Link Checker PRO</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0b0f1a; color: #e2e8f0; padding: 20px; line-height: 1.5; }
        .container { max-width: 800px; margin: auto; }
        h2 { color: #38bdf8; border-bottom: 2px solid #1e293b; padding-bottom: 10px; }
        .controls { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        button { background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #059669; }
        button:disabled { background: #334155; opacity: 0.6; }
        .progress-bar { height: 8px; background: #334155; border-radius: 10px; margin: 15px 0; overflow: hidden; width: 100%; }
        #progressFill { height: 100%; width: 0%; background: #38bdf8; transition: width 0.4s ease; }
        table { width: 100%; border-collapse: collapse; background: #111827; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        th { background: #1f2937; padding: 12px; text-align: left; font-size: 12px; color: #94a3b8; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #1f2937; font-size: 14px; }
        .status-ok { color: #4ade80; font-weight: 600; }
        .status-bad { color: #f87171; font-weight: 600; }
        .status-wait { color: #94a3b8; }
        .btn-link { color: #38bdf8; text-decoration: none; font-size: 12px; border: 1px solid #38bdf8; padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📥 FF Kipas Link Checker</h2>
    
    <div class="controls">
        <button id="startBtn" onclick="runCheck()">Start Analysis</button>
        <div id="statusLabel">Ready to scan 30 links</div>
    </div>

    <div class="progress-bar"><div id="progressFill"></div></div>

    <table id="resultsTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Source URL</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
const urls = [
    "https://arceusx.com/v5", "https://arceusx.com/v5vng", "https://arceusx.com/arceusx",
    "https://arceusx.com/aradmin", "https://arceusx.com/arceusxvng", "https://arceusx.com/arceusx.ipa",
    "https://applinked.org/apk", "https://ffh4x.vip/ffh4x.apk", "https://trollstore.app/trollstore.deb",
    "https://trollstore.app/trollstore.tar", "https://trollstore.app/trollstore64.deb",
    "https://trollstore.app/perhlpr", "https://cyberflix.me/cf360", "https://revanced.org/apk",
    "https://revanced.org/extended", "https://revanced.org/rev-manager", "https://revanced.org/microgdl",
    "https://waveexecutor.com/get", "https://solaraexecutor.com/dl", "https://hydralauncher.net/windows",
    "https://hydralauncher.net/portable", "https://hydralauncher.net/linux-deb", "https://hydralauncher.net/appimage",
    "https://ffkipas.org/ffkipasapp", "https://ffkipas.org/ffkipas32bit", "https://deltaexectr.com/apk",
    "https://deltaexectr.com/arm32.apk", "https://deltaexectr.com/vng.apk", "https://deltaexectr.com/ipa",
    "https://deltaexectr.com/vng.ipa"
];

const tbody = document.getElementById('tableBody');
urls.forEach((url, i) => {
    tbody.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td style="word-break: break-all; color: #94a3b8;">${url}</td>
            <td id="s-${i}" class="status-wait">Waiting...</td>
            <td><a href="${url}" target="_blank" class="btn-link">Open</a></td>
        </tr>
    `;
});

async function checkLink(url, index) {
    const el = document.getElementById(`s-${index}`);
    el.innerText = "Checking...";
    
    // Using AllOrigins which often bypasses 403 because it's a scripted proxy
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

    try {
        const response = await fetch(proxy);
        const data = await response.json();

        if (data.status && data.status.http_code === 200) {
            // Check if it's a real file or just a "Forbidden" page wrapped in a 200
            const content = data.contents || "";
            if (content.includes("Forbidden") || content.includes("Access Denied")) {
                el.innerText = "❌ BLOCKED (403)";
                el.className = "status-bad";
            } else {
                el.innerText = "✅ WORKING";
                el.className = "status-ok";
            }
        } else {
            const code = data.status ? data.status.http_code : "Error";
            el.innerText = `❌ DEAD (${code})`;
            el.className = "status-bad";
        }
    } catch (e) {
        el.innerText = "⚠️ TIMEOUT";
        el.className = "status-bad";
    }
}

async function runCheck() {
    const btn = document.getElementById('startBtn');
    const fill = document.getElementById('progressFill');
    btn.disabled = true;

    for (let i = 0; i < urls.length; i++) {
        await checkLink(urls[i], i);
        let p = ((i + 1) / urls.length) * 100;
        fill.style.width = p + "%";
        document.getElementById('statusLabel').innerText = `Progress: ${Math.round(p)}%`;
        
        // Add a small delay so we don't trigger rate limits
        await new Promise(r => setTimeout(r, 600));
    }

    btn.disabled = false;
    document.getElementById('statusLabel').innerText = "Scan Complete";
}
</script>

</body>
</html>
