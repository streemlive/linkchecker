<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Checker - GitHub Pages Edition</title>
    <style>
        /* Exact styles from your original index.php [cite: 22, 23, 24, 25, 26, 27, 28] */
        body { font-family: Arial; background: #0f172a; color: white; padding: 20px; }
        button { padding: 10px 20px; margin: 5px 0; background: #22c55e; border: none; cursor: pointer; font-weight: bold; color: white; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td, th { padding: 10px; border-bottom: 1px solid #333; }
        .ok { color: #22c55e; font-weight: bold; }
        .bad { color: #ef4444; font-weight: bold; }
        .download-btn { padding: 5px 10px; background: #3b82f6; border: none; color: white; cursor: pointer; border-radius: 3px; text-decoration: none; font-size: 12px; }
        #progressContainer { width: 100%; background: #1e293b; border-radius: 5px; margin-top: 20px; height: 25px; overflow: hidden; }
        #progressBar { height: 100%; width: 0; background: #22c55e; text-align: center; line-height: 25px; color: black; font-weight: bold; transition: width 0.3s; }
    </style>
</head>
<body>

<h2>📥 Download Link Checker</h2>

<button onclick="startChecking()">Check Links</button>
<p id="status">Waiting to start...</p>

<div id="progressContainer">
    <div id="progressBar">0%</div>
</div>

<table id="linkTable">
    <thead>
        <tr>
            <th>#</th>
            <th>URL</th>
            <th>Status</th>
            <th>Details</th>
            <th>Download</th>
        </tr>
    </thead>
    <tbody id="tableBody">
        </tbody>
</table>

<script>
// Your links from links.txt [cite: 50, 51]
const urls = [
    "https://arceusx.com/v5",
    "https://arceusx.com/v5vng",
    "https://arceusx.com/arceusx",
    "https://arceusx.com/aradmin",
    "https://arceusx.com/arceusxvng",
    "https://arceusx.com/arceusx.ipa",
    "https://applinked.org/apk",
    "https://ffh4x.vip/ffh4x.apk",
    "https://painelfreestyle.org/pf.apk",
    "https://github.com/SPDMTiahh/Updates/releases/download/2.1.2/Roblox.-.Arceus.X.v5.1.3.8.apk",
    "https://trollstore.app/trollstore.deb",
    "https://ffkipas.org/ffkipasapp",
    "https://deltaexectr.com/apk"
];

const tableBody = document.getElementById('tableBody');
const CONCURRENT_LIMIT = 3; // Lowered for stability over proxy

// Initialize table rows
urls.forEach((url, i) => {
    tableBody.innerHTML += `
        <tr id="row-${i}">
            <td>${i + 1}</td>
            <td style="word-break: break-all;">${url}</td>
            <td id="status-${i}">⏳ Waiting</td>
            <td id="msg-${i}">-</td>
            <td><a class="download-btn" href="${url}" target="_blank">Download</a></td>
        </tr>
    `;
});

async function checkOne(url, index) {
    const statusCell = document.getElementById("status-" + index);
    const msgCell = document.getElementById("msg-" + index);
    
    // We use a public CORS proxy because GitHub Pages is client-side only
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

    try {
        const res = await fetch(proxyUrl);
        const data = await res.json();

        // Emulating your PHP logic for file detection [cite: 12, 13]
        if (data.status.http_code === 200) {
            const content = data.contents || "";
            // If it contains <html> or <body>, it's likely a webpage, not a direct file
            const isHtml = /<html|<body/i.test(content);
            
            if (!isHtml || content.length > 50000) { 
                statusCell.innerHTML = "✅ WORKING";
                statusCell.className = "ok";
                msgCell.innerText = "File / download detected";
            } else {
                statusCell.innerHTML = "❌ NOT WORKING";
                statusCell.className = "bad";
                msgCell.innerText = "Likely HTML/error page";
            }
        } else {
            statusCell.innerHTML = "❌ NOT WORKING";
            statusCell.className = "bad";
            msgCell.innerText = "HTTP " + data.status.http_code;
        }
    } catch (err) {
        statusCell.innerHTML = "❌ ERROR";
        statusCell.className = "bad";
        msgCell.innerText = "Proxy/CORS Blocked";
    }
}

async function startChecking() {
    document.getElementById("status").innerText = "Checking started...";
    let i = 0;

    while (i < urls.length) {
        let batch = [];
        for (let j = 0; j < CONCURRENT_LIMIT && i < urls.length; j++, i++) {
            batch.push(checkOne(urls[i], i));
        }
        await Promise.all(batch);

        let percent = Math.round((i / urls.length) * 100);
        let progressBar = document.getElementById("progressBar");
        progressBar.style.width = percent + "%";
        progressBar.innerText = percent + "%";
    }

    document.getElementById("status").innerText = "✅ All links checked!";
}
</script>

</body>
</html>
