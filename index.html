<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Kipas Link Checker</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: white; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        button { padding: 12px 24px; background: #22c55e; border: none; cursor: pointer; font-weight: bold; color: white; border-radius: 5px; margin-bottom: 10px; }
        button:disabled { background: #334155; cursor: not-allowed; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; }
        td, th { padding: 12px; border-bottom: 1px solid #334155; text-align: left; font-size: 14px; }
        th { background: #334155; color: #94a3b8; text-transform: uppercase; font-size: 12px; }
        .ok { color: #4ade80; font-weight: bold; }
        .bad { color: #f87171; font-weight: bold; }
        .download-btn { padding: 5px 10px; background: #3b82f6; border: none; color: white; cursor: pointer; border-radius: 3px; text-decoration: none; font-size: 12px; }
        #progressContainer { width: 100%; background: #334155; border-radius: 50px; margin: 20px 0; height: 12px; overflow: hidden; }
        #progressBar { height: 100%; width: 0; background: #22c55e; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h2>📥 Download Link Checker</h2>
    <p style="color: #94a3b8;">Automated status check for FF Kipas & Arceus X links.</p>

    <button id="checkBtn" onclick="startChecking()">Start Checking</button>
    <span id="statusText" style="margin-left: 15px; color: #38bdf8;">Ready</span>

    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>

    <table id="linkTable">
        <thead>
            <tr>
                <th>#</th>
                <th>URL</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
// Links extracted from your links.txt
const urls = [
    "https://arceusx.com/v5", "https://arceusx.com/v5vng", "https://arceusx.com/arceusx",
    "https://arceusx.com/aradmin", "https://arceusx.com/arceusxvng", "https://arceusx.com/arceusx.ipa",
    "https://applinked.org/apk", "https://ffh4x.vip/ffh4x.apk", "https://trollstore.app/trollstore.deb",
    "https://trollstore.app/trollstore.tar", "https://trollstore.app/trollstore64.deb",
    "https://trollstore.app/perhlpr", "https://cyberflix.me/cf360", "https://revanced.org/apk",
    "https://revanced.org/extended", "https://revanced.org/rev-manager", "https://revanced.org/microgdl",
    "https://waveexecutor.com/get", "https://solaraexecutor.com/dl", "https://hydralauncher.net/windows",
    "https://hydralauncher.net/portable", "https://hydralauncher.net/linux-deb", "https://hydralauncher.net/appimage",
    "https://ffkipas.org/ffkipasapp", "https://ffkipas.org/ffkipas32bit", "https://deltaexectr.com/apk",
    "https://deltaexectr.com/arm32.apk", "https://deltaexectr.com/vng.apk", "https://deltaexectr.com/ipa",
    "https://deltaexectr.com/vng.ipa"
];

const tableBody = document.getElementById('tableBody');

// Render initial table
urls.forEach((url, i) => {
    tableBody.innerHTML += `
        <tr>
            <td>${i + 1}</td>
            <td style="word-break: break-all; max-width: 300px;">${url}</td>
            <td id="status-${i}">⏳ Waiting</td>
            <td><a class="download-btn" href="${url}" target="_blank">Link</a></td>
        </tr>
    `;
});

async function checkOne(url, index) {
    const statusCell = document.getElementById("status-" + index);
    statusCell.innerText = "🔄 Checking...";
    
    // Switch to a more reliable proxy (Corsproxy.io)
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;

    try {
        // Use 'HEAD' request first to save bandwidth and check status
        const res = await fetch(proxyUrl, { method: 'GET' });
        
        if (res.ok) {
            statusCell.innerHTML = "✅ WORKING";
            statusCell.className = "ok";
        } else {
            statusCell.innerHTML = `❌ DEAD (${res.status})`;
            statusCell.className = "bad";
        }
    } catch (err) {
        // Final fallback if the proxy itself fails
        statusCell.innerHTML = "⚠️ PROXY ERROR";
        statusCell.className = "bad";
    }
}

async function startChecking() {
    const btn = document.getElementById("checkBtn");
    btn.disabled = true;
    document.getElementById("statusText").innerText = "Processing...";

    for (let i = 0; i < urls.length; i++) {
        await checkOne(urls[i], i);
        
        // Update Progress
        let percent = Math.round(((i + 1) / urls.length) * 100);
        document.getElementById("progressBar").style.width = percent + "%";
        document.getElementById("statusText").innerText = `Checked ${i+1}/${urls.length}`;
    }

    document.getElementById("statusText").innerText = "✅ Done!";
    btn.disabled = false;
}
</script>

</body>
</html>
